      gap: 3px;

      border: none;
      border-radius: 6px;

      .cell { font-size: 0.68rem; padding: 4px 3px 3px; }
      .cell-icon { font-size: 1rem; }
    }
  </style>
</head>

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getGridZones() {
  const outer = [];
  const inner = [];
  for (let r = 0; r < 6; r++) {
    for (let c = 0; c < 6; c++) {
      const idx = r * 6 + c;
      if (r >= 1 && r <= 4 && c >= 1 && c <= 4) inner.push(idx);
      else outer.push(idx);
    }
  }
  return { inner, outer };
}

function generateBoard() {
  const { inner, outer } = getGridZones();
  const pinkOrder = shuffle([...Array(16).keys()]);
  const yellowOrder = shuffle([...Array(20).keys()]);
  const board = new Array(36);
  inner.forEach((pos, i) => { board[pos] = { type: 'pink', taskIndex: pinkOrder[i] }; });
  outer.forEach((pos, i) => { board[pos] = { type: 'yellow', taskIndex: yellowOrder[i] }; });
  return board;
}

    5: { emoji: '⭐', title: 'Fem gule fullført!', text: `Herlig innsats, ${playerName}! 5 av 20 gule oppgaver er unnagjort. Du går for gull!` },
    10: { emoji: '🌟', title: 'Halvveis gule!', text: `Wow, ${playerName}! Halvparten av de gule ekstraoppgavene er fullført! Du viser skikkelig dedikasjon!` },
    15: { emoji: '🔥', title: 'Nesten alle gule!', text: `Utrolig, ${playerName}! Bare 5 gule igjen. Du er en maskin!` },
    20: { emoji: '👑', title: 'ALLE GULE FULLFØRT!', text: `${playerName}, du er helt RÅ! 👑 Alle 20 ekstraoppgaver er fullført! Du har virkelig gått den ekstra milen denne sommeren!` }
  };

  const pinkKey = 'pink_' + pinkCount;
  if (pinkMilestones[pinkCount] && !shownMilestones.has(pinkKey)) {
    shownMilestones.add(pinkKey);
    showMilestone(pinkMilestones[pinkCount], pinkCount === 16);
    return;
  }

  const yellowKey = 'yellow_' + yellowCount;
  if (yellowMilestones[yellowCount] && !shownMilestones.has(yellowKey)) {
    shownMilestones.add(yellowKey);
    showMilestone(yellowMilestones[yellowCount], false);
  }
}

function closeMilestone() {
  document.getElementById('milestone-overlay').classList.remove('show');
}

async function saveProgress() {
  if (!playerId) return;
  const data = {
    completed: Array.from(completed),
    board: boardLayout,
    shown_milestones: Array.from(shownMilestones)
  };
  await db.from('players').update({ progress: data }).eq('id', playerId);
}

async function loadOrCreatePlayer(name) {
  const { data: existing } = await db
    .from('players')
    .select('*')
    .eq('name', name.toLowerCase().trim())
    .maybeSingle();

  if (existing) {
    playerId = existing.id;
    const p = existing.progress || {};
    completed = new Set(p.completed || []);
    boardLayout = p.board || generateBoard();
    shownMilestones = new Set(p.shown_milestones || []);
  } else {
    boardLayout = generateBoard();
    completed = new Set();
    shownMilestones = new Set();
    const { data: created } = await db
      .from('players')
      .insert({ name: name.toLowerCase().trim(), progress: { completed: [], board: boardLayout, shown_milestones: [] } })
      .select()
      .single();
    playerId = created.id;
  }
}

async function startGame() {
  const input = document.getElementById('name-input');
  const name = input.value.trim();
  if (!name) { input.focus(); return; }

  playerName = name.charAt(0).toUpperCase() + name.slice(1).toLowerCase();

  try {
    await loadOrCreatePlayer(playerName);
    localStorage.setItem('sommerbingo_name', playerName);
    document.getElementById('name-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'block';
    document.getElementById('player-label').innerHTML = `<em>Spiller: ${playerName}</em>`;
    renderGrid();
  } catch (err) {
    alert('Feil ved tilkobling til databasen:\n' + err.message);
    console.error(err);
  }
}

function changePlayer() {
  localStorage.removeItem('sommerbingo_name');
  playerName = '';
  playerId = null;
  completed = new Set();
  shownMilestones = new Set();
  document.getElementById('game-screen').style.display = 'none';
  document.getElementById('name-screen').style.display = 'flex';
  document.getElementById('name-input').value = '';
}

window.addEventListener('DOMContentLoaded', async () => {
  const saved = localStorage.getItem('sommerbingo_name');
  if (saved) {
    document.getElementById('name-input').value = saved;
    await startGame();
  }
});

document.getElementById('name-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') startGame();
});
</script>
